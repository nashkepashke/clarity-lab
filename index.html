<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <div class="lang-toggle" id="lang-toggle" role="group" aria-label="Language / שפה">
        <button type="button" class="lang-btn" data-lang="he"></button>
        <button type="button" class="lang-btn" data-lang="en"></button>
      </div>
      <h1 id="page-title"></h1>
      <p class="subtitle" id="page-subtitle"></p>
    </header>

    <section class="input-card" id="input-card">
      <div class="chips" id="chips"></div>

      <div class="image-attach-row">
        <button type="button" id="image-attach-btn" class="image-attach-btn"></button>
        <input type="file" id="image-file-input" class="image-file-input" accept="image/png,image/jpeg,image/webp" hidden />
        <span class="image-hint" id="image-hint"></span>
      </div>

      <div class="image-preview" id="image-preview" hidden>
        <img id="image-preview-img" class="image-preview-img" alt="" />
        <button type="button" id="image-remove-btn" class="image-remove-btn">×</button>
      </div>

      <label for="claim-input" class="input-label" id="input-label"></label>
      <p class="extract-prompt" id="extract-prompt" hidden></p>
      <textarea
        id="claim-input"
        class="claim-input"
        rows="4"
        dir="auto"
      ></textarea>

      <button type="button" id="analyze-btn" class="analyze-btn"></button>

      <details class="history-panel" id="history-panel">
        <summary id="history-toggle"></summary>
        <div class="history-body">
          <p class="history-privacy-note" id="history-privacy-note"></p>
          <ul class="history-list" id="history-list"></ul>
          <button type="button" class="history-clear-btn" id="history-clear-btn"></button>
        </div>
      </details>
    </section>

    <p id="error-area" class="error-message" dir="auto" hidden></p>

    <section id="dashboard-area" class="dashboard-area" hidden>
      <section id="bottom-line" class="bottom-line" hidden>
        <div class="bottom-line-band" id="bottom-line-band">
          <span class="action-icon" id="action-icon"></span>
          <span class="action-label" id="action-label"></span>
        </div>
        <div class="bottom-line-body">
          <p class="bottom-line-sentence" id="bottom-line-sentence" dir="auto"></p>
          <p class="bottom-line-rationale" id="bottom-line-rationale"></p>
        </div>
      </section>

      <section class="verdict-strip" id="verdict-strip">
        <div class="verdict-headline">
          <span class="verdict-label" id="verdict-label"></span>
          <span id="verdict-badge"></span>
        </div>
        <div class="dials" id="dials"></div>
      </section>

      <div class="dashboard-grid">
        <div class="claims-column" id="claims-column"></div>
        <aside class="evidence-rail" id="evidence-rail"></aside>
      </div>
    </section>

    <footer class="disclaimer" id="disclaimer"></footer>
  </main>

  <script src="translations.js"></script>
  <script src="analyzeClaim.js"></script>
  <script src="app.js"></script>
</body>
</html>

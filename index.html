<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <div class="lang-toggle" id="lang-toggle" role="group" aria-label="Language / שפה">
        <button type="button" class="lang-btn" data-lang="he"></button>
        <button type="button" class="lang-btn" data-lang="en"></button>
      </div>
      <h1 id="page-title"></h1>
      <p class="subtitle" id="page-subtitle"></p>
    </header>

    <section class="input-card">
      <div class="chips" id="chips"></div>

      <label for="claim-input" class="input-label" id="input-label"></label>
      <textarea
        id="claim-input"
        class="claim-input"
        rows="4"
        dir="auto"
      ></textarea>

      <button type="button" id="analyze-btn" class="analyze-btn"></button>

      <details class="history-panel" id="history-panel">
        <summary id="history-toggle"></summary>
        <div class="history-body">
          <ul class="history-list" id="history-list"></ul>
          <button type="button" class="history-clear-btn" id="history-clear-btn"></button>
        </div>
      </details>
    </section>

    <p id="error-area" class="error-message" dir="auto" hidden></p>

    <section id="dashboard-area" class="dashboard-area" hidden>
      <section class="verdict-strip" id="verdict-strip">
        <div class="verdict-headline">
          <span class="verdict-label" id="verdict-label"></span>
          <span id="verdict-badge"></span>
        </div>
        <div class="dials" id="dials"></div>
      </section>

      <div class="dashboard-grid">
        <div class="claims-column" id="claims-column"></div>
        <aside class="evidence-rail" id="evidence-rail"></aside>
      </div>
    </section>

    <footer class="disclaimer" id="disclaimer"></footer>
  </main>

  <script src="translations.js"></script>
  <script src="analyzeClaim.js"></script>
  <script src="app.js"></script>
</body>
</html>

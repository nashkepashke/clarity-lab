<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claim Breakdown</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>Claim Breakdown</h1>
      <p class="subtitle">Paste a claim or statement and see it broken down.</p>
    </header>

    <section class="input-card">
      <div class="chips" id="chips">
        <button type="button" class="chip" data-claim="Coffee is bad for your health.">Coffee is bad for your health.</button>
        <button type="button" class="chip" data-claim="Remote work will become the default for most office jobs by 2030.">Remote work will become the default by 2030.</button>
        <button type="button" class="chip" data-claim="This new law is the right way to fix the housing crisis.">This new law fixes the housing crisis.</button>
      </div>

      <label for="claim-input" class="input-label">Your claim</label>
      <textarea
        id="claim-input"
        class="claim-input"
        rows="4"
        placeholder="Paste or type a short claim or statement..."
      ></textarea>

      <button type="button" id="analyze-btn" class="analyze-btn">Break it down</button>
    </section>

    <section id="result-area" class="result-area" hidden>
      <!-- Result card is rendered here by app.js -->
    </section>

    <footer class="disclaimer">
      Demo only — not a real fact-checker.
    </footer>
  </main>

  <script src="analyzeClaim.js"></script>
  <script src="app.js"></script>
</body>
</html>
